<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, minimum-scale=1.0, initial-scale=1.0, user-scalable=yes">
    <title>PDF.js spike — pdf_viewer components</title>
    <!--
        Third PDF.js spike in the series.

        Unlike pdfjs-spike (raw canvas rendering we drive ourselves) and
        pdfjs-viewer-spike (the full Mozilla reference viewer inside an
        iframe), this spike uses pdfjs-dist's `pdf_viewer` module directly:
        PDFViewer + EventBus + PDFLinkService + PDFFindController, rendered
        straight into our DOM with no iframe and no toolbar.

        That gives us pagination, text selection, search, and link handling
        out of the box — and leaves styling/chrome entirely up to us. If the
        attachment-preview replacement needs a custom surrounding UI, this
        is the approach that fits.

        JS (getDocument, PDFViewer, EventBus, PDFLinkService) is imported
        from the tg platform bundle at /resources/polymer/lib/pdfjs-lib.js,
        which re-exports from the npm-installed pdfjs-dist/legacy/* modules.

        Runtime assets (pdf_viewer.css, pdf.worker.min.mjs, cmaps, fonts,
        wasm) are pulled from jsDelivr for now because the current rollup
        pipeline emits only the imported .mjs chunks and the install script
        then overwrites polymer/pdfjs-dist/ with those — wiping the static
        asset tree. Fixing that needs a rollup-plugin-copy step to mirror
        node_modules/pdfjs-dist/legacy/build and legacy/web into the output;
        once that's in place these CDN URLs can move to /resources/polymer/.
    -->
    <style>
        html, body { margin: 0; padding: 0; height: 100%; }
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background: #eef0f3;
            color: #222;
            padding: 16px;
            box-sizing: border-box;
        }
        h1 { font-size: 16px; margin: 0 0 4px; }
        .hint { font-size: 12px; color: #555; margin-bottom: 12px; }
        .layout {
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 12px;
            height: calc(100vh - 32px);
        }
        .controls {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 10px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            font-size: 13px;
        }
        .controls label { font-weight: 500; }
        .controls input[type="text"] {
            flex: 1;
            min-width: 220px;
            font: inherit;
            padding: 4px 6px;
            border: 1px solid #bbb;
            border-radius: 3px;
        }
        .controls button {
            font: inherit;
            padding: 4px 10px;
            border: 1px solid #bbb;
            background: #fafafa;
            border-radius: 3px;
            cursor: pointer;
        }
        /*
            PDFViewer requires its container to be position:absolute (or
            equivalent) so pages can lay out with `top` offsets. The wrapper
            is position:relative so the container fills it without escaping.
        */
        .viewer-wrap {
            position: relative;
            background: #525659;
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: hidden;
        }
        #viewerContainer {
            position: absolute;
            inset: 0;
            overflow: auto;
        }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/web/pdf_viewer.css">
</head>
<body>
    <div class="layout">
        <div>
            <h1>PDF.js spike — pdf_viewer components</h1>
            <div class="hint">
                Uses pdfjs-dist's PDFViewer/EventBus/PDFLinkService directly
                — no iframe, no wrapper web component. Good baseline for a
                custom-chrome attachment preview.
            </div>
            <div class="controls">
                <label for="src">PDF URL:</label>
                <input id="src" type="text" value="../sample-local-pdf.pdf">
                <button id="load">Load</button>
                <button id="prev">Prev</button>
                <button id="next">Next</button>
                <span id="pageInfo"></span>
            </div>
        </div>
        <div class="viewer-wrap">
            <div id="viewerContainer">
                <div id="viewer" class="pdfViewer"></div>
            </div>
        </div>
    </div>
    <script type="module">
        // JS API comes from the platform's rolled-up pdfjs-lib — a barrel
        // over pdfjs-dist/legacy/build/pdf.mjs and legacy/web/pdf_viewer.mjs.
        // Using 'legacy' avoids the ES2024 regex 'v' flag that acorn (the
        // rollup parser) refuses to parse in the modern build.
        import {
            getDocument,
            GlobalWorkerOptions,
            EventBus,
            PDFLinkService,
            PDFViewer,
        } from '/resources/polymer/lib/pdfjs-lib.js';

        // Worker, viewer CSS, cmaps, fonts, and wasm are still on jsDelivr
        // — see the header comment for why. Pin to 4.10.38 so the assets
        // match the pdfjs-dist version currently in package.json.
        GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/legacy/build/pdf.worker.min.mjs';
        const CMAP_URL = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/cmaps/';
        const STANDARD_FONTS_URL = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/standard_fonts/';
        const WASM_URL = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/web/wasm/';

        const container = document.getElementById('viewerContainer');
        const eventBus = new EventBus();
        const pdfLinkService = new PDFLinkService({ eventBus });
        const pdfViewer = new PDFViewer({
            container,
            eventBus,
            linkService: pdfLinkService,
            textLayerMode: 1,
        });
        pdfLinkService.setViewer(pdfViewer);

        const srcInput = document.getElementById('src');
        const pageInfo = document.getElementById('pageInfo');

        const updatePageInfo = () => {
            pageInfo.textContent = `Page ${pdfViewer.currentPageNumber} / ${pdfViewer.pagesCount}`;
        };

        eventBus.on('pagesinit', () => {
            pdfViewer.currentScaleValue = 'page-width';
            updatePageInfo();
        });
        eventBus.on('pagechanging', updatePageInfo);
        eventBus.on('pagerendered', async (e) => {
            const textContent = await e.source.pdfPage.getTextContent();
            console.log(`[spike] page ${e.pageNumber}: ${textContent.items.length} text items`);
        });

        const load = async (url) => {
            try {
                const loadingTask = getDocument({
                    url: new URL(url.trim(), window.location.href).href,
                    cMapUrl: CMAP_URL,
                    cMapPacked: true,
                    standardFontDataUrl: STANDARD_FONTS_URL,
                    wasmUrl: WASM_URL,
                });
                const pdf = await loadingTask.promise;
                pdfViewer.setDocument(pdf);
                pdfLinkService.setDocument(pdf, null);
            } catch (err) {
                console.error('[spike] load failed', err);
            }
        };

        document.getElementById('load').addEventListener('click', () => load(srcInput.value));
        document.getElementById('prev').addEventListener('click', () => {
            if (pdfViewer.currentPageNumber > 1) pdfViewer.currentPageNumber--;
        });
        document.getElementById('next').addEventListener('click', () => {
            if (pdfViewer.currentPageNumber < pdfViewer.pagesCount) pdfViewer.currentPageNumber++;
        });

        load(srcInput.value);
    </script>
</body>
</html>
