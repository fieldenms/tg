<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>PDF embed spike</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%;}
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background: #f5f5f7;
            color: #222;
            padding: 16px;
            box-sizing: border-box;
        }
        h3 { font-size: 13px; font-family: ui-monospace, Consolas, monospace; margin: 0 0 8px; color: #444; }
        .grid { display: grid; gap: 16px; height: 100%;}
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }
        .viewport {
            position: relative;
            width: 100%;
            height: 100%;
            background: #fafafa;
            border: 1px dashed #ccc;
            overflow: hidden;
        }
        .viewport object,
        .viewport embed,
        .viewport iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }
    </style>
</head>
<body>
    <div class="grid grid-3">
        <div class="card">
            <h3>&lt;object data type&gt;</h3>
            <div class="viewport">
                <object data="sample-local-pdf.pdf" type="application/pdf"></object>
            </div>
        </div>
        <div class="card">
            <h3>&lt;embed src type&gt;</h3>
            <div class="viewport">
                <embed src="sample-local-pdf.pdf" type="application/pdf">
            </div>
        </div>
        <div class="card">
            <h3>&lt;iframe src&gt;</h3>
            <div class="viewport">
                <iframe src="sample-local-pdf.pdf" title="sample PDF"></iframe>
            </div>
        </div>
    </div>
    
</body>
</html>
